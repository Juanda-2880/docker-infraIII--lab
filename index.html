<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Docker Status: Online</title>
    <style>
        :root {
            --bg-color: #0d1117;
            --accent-color: #00ffd9;
            --card-bg: #161b22;
            --text-color: #c9d1d9;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .container {
            text-align: center;
            padding: 3rem;
            background: var(--card-bg);
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5), 
                        0 0 20px rgba(0, 255, 217, 0.1);
            border: 1px solid rgba(0, 255, 217, 0.2);
            transition: transform 0.3s ease;
        }

        .container:hover {
            transform: translateY(-5px);
            border-color: var(--accent-color);
        }

        .status-dot {
            height: 15px;
            width: 15px;
            background-color: var(--accent-color);
            border-radius: 50%;
            display: inline-block;
            margin-right: 10px;
            box-shadow: 0 0 10px var(--accent-color);
            animation: pulse 2s infinite;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
            letter-spacing: -1px;
        }

        p {
            font-family: 'Courier New', Courier, monospace;
            color: #8b949e;
            font-size: 1.1rem;
        }

        .docker-logo {
            width: 80px;
            margin-bottom: 20px;
            filter: drop-shadow(0 0 5px rgba(0, 255, 217, 0.4));
        }

        @keyframes pulse {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(0, 255, 217, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 10px rgba(0, 255, 217, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(0, 255, 217, 0); }
        }
    </style>
</head>
